name: Playwright scheduled run

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-next-run]

jobs:
  run-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WEBSITE: ${{ secrets.WEBSITE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Restore previous appointment state
        uses: actions/cache@v4
        with:
          path: .appointment-state
          key: appointment-state-${{ runner.os }}-${{ github.workflow }}-${{ github.repository }}

      - name: Run Playwright script
        id: playwright_run
        env:
          WEBSITE: ${{ secrets.WEBSITE }}
        run: |
          mkdir -p .appointment-state
          set +e
          npx playwright test browser.spec.ts
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compare appointment state
        id: appointment_state
        if: ${{ steps.playwright_run.outputs.exit_code == '0' }}
        run: |
          mkdir -p .appointment-state
          if [ -f .appointment-state/current-state.txt ]; then
            if [ -f .appointment-state/last-state.txt ]; then
              if cmp -s .appointment-state/current-state.txt .appointment-state/last-state.txt; then
                echo "changed=false" >> "$GITHUB_OUTPUT"
              else
                cp .appointment-state/current-state.txt .appointment-state/last-state.txt
                echo "changed=true" >> "$GITHUB_OUTPUT"
              fi
            else
              cp .appointment-state/current-state.txt .appointment-state/last-state.txt
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send ntfy.sh notification on success
        if: ${{ steps.playwright_run.outputs.exit_code == '0' && steps.appointment_state.outputs.changed == 'true' && env.NTFY_TOPIC != '' }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          curl -d "✓ Playwright test passed! New appointments may be available: https://www.bonn.de/vv/produkte/AIDS-HIV-Beratung-Test-Untersuchung.php" \
            "https://ntfy.sh/${NTFY_TOPIC}"
